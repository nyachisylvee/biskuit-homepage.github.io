<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Expressive Profile - biskuit :3</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght,GRAD@8..144,25..151,100..1000,-200..150&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --md-color-bg: #0f131a; --md-color-surface: #191c24; --md-color-surface-bright: #222630;
            --md-color-primary: #adc6ff; --md-color-on-primary: #002e69; --md-color-primary-container: #2b447a;
            --md-color-on-surface: #e3e2e6; --md-color-variant: #c4c6d0;
            --md-ease-expressive: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        body { font-family: 'Roboto Flex', sans-serif; background-color: var(--md-color-bg); color: var(--md-color-on-surface); min-height: 100vh; display: flex; justify-content: center; padding: 18px; }
        .wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }
        
        /* The Glow Reveal Hero Card, owo! */
        .profile-hero { 
            position: relative; overflow: hidden; background: var(--md-color-surface); border-radius: 36px 12px 36px 36px; padding: 28px; 
            display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid rgba(255,255,255,0.03); transition: 0.5s; 
        }
        .profile-hero::before { 
            content: ''; position: absolute; top:0; left:0; right:0; bottom:0; border-radius: inherit; 
            background: radial-gradient(circle 200px at var(--mouse-x, 0) var(--mouse-y, 0), rgba(173, 198, 255, 0.15), transparent 70%); 
            pointer-events: none; opacity: 0; transition: opacity 0.4s ease; 
        }
        .profile-hero:hover::before { opacity: 1; }

        /* Restoring all your original layout styles, nyaa~! */
        .expressive-card { background: var(--md-color-surface); border-radius: 28px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .card-label-header { font-size: 0.85rem; font-weight: 900; color: var(--md-color-primary); text-transform: uppercase; letter-spacing: 2px; }
        .track-strip { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-radius: 24px; background: var(--md-color-surface); cursor: pointer; transition: 0.4s; border: 1px solid transparent; }
        .track-strip:hover { background: var(--md-color-surface-bright); transform: scale(1.01); }
        .active-playing-strip { background: var(--md-color-primary-container) !important; border-radius: 12px 32px 32px 32px !important; transform: scale(1.03); }
        .action-toggle-trigger { background: var(--md-color-surface-bright); color: var(--md-color-primary); border-radius: 18px; padding: 8px 18px; font-weight: 800; cursor: pointer; }
        .active-playing-strip .action-toggle-trigger { background: #ffffff !important; color: var(--md-color-on-primary) !important; }
        .track-title-node { font-size: 1.05rem; font-weight: 500; color: #ffffff; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="app-bar" style="display:flex; align-items:center; gap:24px; padding:8px;">
            <a href="./index.html" style="width:48px; height:48px; border-radius:16px; background:var(--md-color-surface); display:flex; align-items:center; justify-content:center; color:var(--md-color-primary); text-decoration:none;">←</a>
            <span style="font-size:1.5rem;">biskuit.sys</span>
        </header>

        <section class="profile-hero">
            <img src="avatar.png" style="width:110px; height:110px; border-radius:42px 20px 42px 42px; border:3px solid var(--md-color-primary);">
            <h1 style="font-size:2.2rem; margin-top:10px;">biskuit :3</h1>
            <div style="background:rgba(173,198,255,0.15); padding:6px 20px; border-radius:100px; margin-top:8px;">Haii~ :3</div>
        </section>

        <section class="expressive-card">
            <h2 class="card-label-header">Info</h2>
            <div style="display:flex; flex-direction:column; gap:12px;">
                <div style="background:rgba(255,255,255,0.03); padding:14px; border-radius:16px;">Sylveon (fav)</div>
                <div style="background:rgba(255,255,255,0.03); padding:14px; border-radius:16px;">Furry</div>
                <div style="background:rgba(255,255,255,0.03); padding:14px; border-radius:16px;">Love Techs stuff</div>
                <div style="background:rgba(255,255,255,0.03); padding:14px; border-radius:16px;">I use Arch btw :3</div>
                <div style="background:rgba(255,255,255,0.03); padding:14px; border-radius:16px;">Indonesian</div>
            </div>
        </section>

        <main class="expressive-card">
            <h2 class="card-label-header">Expressive Player</h2>
            <audio id="audio1" src="clouds.mp3"></audio>
            <audio id="audio2" src="dismiss.mp3"></audio>
            <div id="row1" class="track-strip" onclick="togglePlay('audio1', 'row1')">
                <div style="display:flex; align-items:center; gap:18px;">
                    <button class="action-toggle-trigger" id="btn-audio1">Play</button>
                    <div><span class="track-title-node">Clouds. F 172bpm 450hz</span></div>
                </div>
            </div>
            <div id="row2" class="track-strip" onclick="togglePlay('audio2', 'row2')">
                <div style="display:flex; align-items:center; gap:18px;">
                    <button class="action-toggle-trigger" id="btn-audio2">Play</button>
                    <div><span class="track-title-node">Dismiss. Fm 153bpm 430hz</span></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const hero = document.querySelector('.profile-hero');
        hero.addEventListener('mousemove', (e) => {
            const rect = hero.getBoundingClientRect();
            hero.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
            hero.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
        });

        function togglePlay(audioId, rowId) {
            var audio = document.getElementById(audioId);
            var row = document.getElementById(rowId);
            var btn = document.getElementById('btn-' + audioId);
            document.querySelectorAll('audio').forEach(a => { if(a.id !== audioId) { a.pause(); a.currentTime = 0; } });
            document.querySelectorAll('.track-strip').forEach(r => r.classList.remove('active-playing-strip'));
            document.querySelectorAll('.action-toggle-trigger').forEach(b => b.textContent = 'Play');
            if (audio.paused) { audio.play(); row.classList.add('active-playing-strip'); btn.textContent = 'Pause'; }
            else { audio.pause(); row.classList.remove('active-playing-strip'); btn.textContent = 'Play'; }
        }
    </script>
</body>
<
    /html>
