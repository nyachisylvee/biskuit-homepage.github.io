<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Expressive Profile - biskuit :3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght,GRAD@8..144,25..151,100..1000,-200..150&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* ── M3 Expressive Deep Dark Color Tokens ── */
            --md-color-bg:                    #0f131a;
            --md-color-surface:               #191c24;
            --md-color-surface-bright:        #222630;
            --md-color-surface-container:     #1e222b;
            --md-color-surface-container-high:#262a34;

            /* Primary (Blue) */
            --md-color-primary:               #adc6ff;
            --md-color-on-primary:            #002e69;
            --md-color-primary-container:     #2b447a;
            --md-color-on-primary-container:  #d8e2ff; /* ← was undefined → fixed */

            /* Secondary (Lavender) */
            --md-color-secondary:             #c3c8e0;
            --md-color-on-secondary:          #2d3246;
            --md-color-secondary-container:   #444b62;
            --md-color-on-secondary-container:#dfe3fb;

            /* Tertiary (Mauve/Rose) */
            --md-color-tertiary:              #e6b9d8;
            --md-color-on-tertiary:           #432540;
            --md-color-tertiary-container:    #5b3c5a;
            --md-color-on-tertiary-container: #ffd8f5;

            /* Neutral */
            --md-color-on-surface:            #e3e2e6;
            --md-color-variant:               #c4c6d0;
            --md-color-outline:               #8e9099;
            --md-color-outline-variant:       #44474f;

            /* ── M3 Expressive Motion Physics ── */
            /* Spring: bouncy, elastic — used for shape & scale changes */
            --md-ease-spring:           cubic-bezier(0.34, 1.56, 0.64, 1);
            /* Standard: smooth deceleration — used for color/opacity */
            --md-ease-standard:         cubic-bezier(0.2, 0, 0, 1);
            /* Emphasized: smooth enters/exits for containers */
            --md-ease-emphasized:       cubic-bezier(0.05, 0.7, 0.1, 1.0);
        }

        body {
            font-family: 'Roboto Flex', sans-serif;
            background-color: var(--md-color-bg);
            color: var(--md-color-on-surface);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 18px;
            overflow-x: hidden;
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 28px;
        }

        /* ── Staggered M3 Expressive Entrance ── */
        /* Each child slides and pops in with spring, offset by delay */
        .wrapper > * {
            animation: expressive-entrance var(--md-ease-emphasized) both;
        }
        .wrapper > *:nth-child(1) { animation-duration: 0.45s; animation-delay: 0ms;   }
        .wrapper > *:nth-child(2) { animation-duration: 0.55s; animation-delay: 70ms;  }
        .wrapper > *:nth-child(3) { animation-duration: 0.60s; animation-delay: 130ms; }
        .wrapper > *:nth-child(4) { animation-duration: 0.65s; animation-delay: 190ms; }
        .wrapper > *:nth-child(5) { animation-duration: 0.70s; animation-delay: 240ms; }

        @keyframes expressive-entrance {
            from { opacity: 0; transform: scale(0.93) translateY(36px); }
            to   { opacity: 1; transform: scale(1)    translateY(0);    }
        }

        /* ── App Bar ── */
        .app-bar {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 8px;
        }

        .back-nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--md-color-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--md-color-primary);
            text-decoration: none;
            /* Each property gets its own curve to feel lively */
            transition:
                background     0.3s var(--md-ease-standard),
                color          0.3s var(--md-ease-standard),
                border-radius  0.45s var(--md-ease-spring),
                transform      0.45s var(--md-ease-spring);
        }

        .back-nav-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.35s var(--md-ease-spring);
        }

        .back-nav-btn:hover {
            background: var(--md-color-primary);
            color: var(--md-color-on-primary);
            border-radius: 24px;
            transform: scale(1.1) rotate(-8deg);
        }

        .back-nav-btn:hover svg {
            transform: translateX(-3px);
        }

        .app-bar-title {
            font-size: 1.5rem;
            font-weight: 300;
            /* Variable font width axis — M3 Expressive uses wide, expressive type */
            font-variation-settings: 'wdth' 120;
            letter-spacing: -0.5px;
        }

        /* ── Profile Hero ── */
        /* Asymmetric corner radii are a core M3 Expressive shape signature */
        .profile-hero {
            background: var(--md-color-surface);
            border-radius: 36px 12px 36px 36px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition:
                border-radius 0.55s var(--md-ease-spring),
                transform     0.5s  var(--md-ease-spring),
                background    0.3s  var(--md-ease-standard),
                box-shadow    0.35s var(--md-ease-standard);
        }

        /* Shape morphs to the opposite asymmetry on hover — M3 Expressive */
        .profile-hero:hover {
            border-radius: 36px 36px 12px 36px;
            transform: translateY(-4px) scale(1.02);
            background: var(--md-color-surface-bright);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
        }

        .avatar-frame {
            position: relative;
            margin-bottom: 18px;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 42px 20px 42px 42px;
            object-fit: cover;
            border: 3px solid var(--md-color-primary);
            transition:
                border-radius 0.65s var(--md-ease-spring),
                transform     0.65s var(--md-ease-spring),
                box-shadow    0.4s  var(--md-ease-standard);
        }

        .profile-hero:hover .profile-pic {
            border-radius: 24px 42px 24px 24px;
            transform: scale(1.08) rotate(6deg);
            box-shadow: 0 8px 28px rgba(173, 198, 255, 0.3);
        }

        .status-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: #93000a;
            color: #ffdad6;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 100px;
            border: 3px solid var(--md-color-surface);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.5px;
        }

        .user-name {
            font-size: 2.2rem;
            font-weight: 800;
            font-variation-settings: 'wdth' 130;
            color: #ffffff;
            letter-spacing: -1px;
        }

        /* ── Greeting chip ── */
        /* Now correctly uses --md-color-on-primary-container, which is defined above */
        .user-greeting-chip {
            font-size: 1rem;
            font-weight: 600;
            color: var(--md-color-on-primary-container);
            background: rgba(173, 198, 255, 0.15);
            border: 1px solid rgba(173, 198, 255, 0.2);
            padding: 6px 20px;
            border-radius: 100px;
            margin-top: 10px;
            letter-spacing: 0.4px;
            transition:
                background 0.3s var(--md-ease-spring),
                transform  0.35s var(--md-ease-spring);
        }

        .profile-hero:hover .user-greeting-chip {
            background: rgba(173, 198, 255, 0.25);
            transform: scale(1.04);
        }

        /* ── Expressive Info Card ── */
        .expressive-card {
            background: var(--md-color-surface);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .card-label-header {
            font-size: 0.78rem;
            font-weight: 900;
            font-variation-settings: 'wdth' 110;
            color: var(--md-color-primary);
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }

        .info-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-pill-row {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition:
                background     0.25s var(--md-ease-spring),
                transform      0.3s  var(--md-ease-spring),
                border-radius  0.35s var(--md-ease-spring);
        }

        /* Left-biased corner squeeze on hover — M3 Expressive shape language */
        .info-pill-row:hover {
            background: rgba(173, 198, 255, 0.08);
            transform: translateX(6px) scale(1.01);
            border-radius: 6px 16px 16px 6px;
        }

        .info-key {
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--md-color-variant);
        }

        .info-val {
            font-size: 0.96rem;
            font-weight: 700;
            font-variation-settings: 'wdth' 105;
            color: #ffffff;
        }

        /* ── Audio Player Strips ── */
        .track-strip {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 22px;
            background: var(--md-color-surface-container);
            cursor: pointer;
            user-select: none;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition:
                background    0.4s  var(--md-ease-spring),
                border-radius 0.55s var(--md-ease-spring),
                transform     0.4s  var(--md-ease-spring),
                box-shadow    0.35s var(--md-ease-standard),
                border-color  0.3s  var(--md-ease-standard);
        }

        .track-strip:hover {
            background: var(--md-color-surface-container-high);
            transform: scale(1.01);
        }

        /* Progress bar — grows at bottom of strip while playing */
        .track-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: var(--md-color-primary);
            border-radius: 0 3px 0 0;
            opacity: 0;
            /* Use linear so progress feels real-time, not eased */
            transition: opacity 0.3s var(--md-ease-standard);
            pointer-events: none;
        }

        .track-core {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        .action-toggle-trigger {
            background: var(--md-color-surface-bright);
            color: var(--md-color-primary);
            border: 2px solid rgba(255, 255, 255, 0.06);
            padding: 8px 16px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 800;
            font-variation-settings: 'wdth' 100;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 80px;
            text-align: center;
            flex-shrink: 0;
            cursor: pointer;
            transition:
                background    0.35s var(--md-ease-spring),
                color         0.3s  var(--md-ease-standard),
                border-color  0.3s  var(--md-ease-standard),
                border-radius 0.45s var(--md-ease-spring),
                transform     0.35s var(--md-ease-spring);
        }

        .track-strip:hover .action-toggle-trigger {
            transform: scale(1.06);
        }

        .track-meta-data {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .track-title-node {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            transition:
                font-weight            0.35s var(--md-ease-standard),
                font-variation-settings 0.35s var(--md-ease-standard),
                color                  0.3s  var(--md-ease-standard);
        }

        .track-author-node {
            font-size: 0.82rem;
            color: var(--md-color-variant);
            margin-top: 2px;
        }

        /* ── Active State — M3 Expressive container transform ── */
        /* Shape morphs from symmetrical pill → asymmetric expressive form */
        .active-playing-strip {
            background: var(--md-color-primary-container) !important;
            border-radius: 12px 28px 28px 28px !important;
            box-shadow: 0 10px 32px rgba(43, 68, 122, 0.5) !important;
            transform: scale(1.03) !important;
            border-color: rgba(173, 198, 255, 0.18) !important;
        }

        .active-playing-strip .track-progress-bar {
            opacity: 1;
        }

        .active-playing-strip .action-toggle-trigger {
            background: var(--md-color-primary) !important;
            color: var(--md-color-on-primary) !important;
            border-color: transparent !important;
            border-radius: 10px !important;
        }

        /* Variable font axis stretch at active state — uniquely expressive */
        .active-playing-strip .track-title-node {
            font-weight: 900;
            font-variation-settings: 'wdth' 140;
            color: var(--md-color-primary);
        }

        /* ── Footer ── */
        .certified-footer {
            text-align: center;
            font-size: 0.72rem;
            font-weight: 900;
            font-variation-settings: 'wdth' 110;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--md-color-variant);
            opacity: 0.4;
            padding: 8px 0;
        }
    </style>
</head>
<body>
    <div class="wrapper">

        <header class="app-bar">
            <a href="./index.html" class="back-nav-btn" aria-label="Back">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <span class="app-bar-title">biskuit.sys</span>
        </header>

        <section class="profile-hero">
            <div class="avatar-frame">
                <img src="avatar.png" alt="Cookie Avatar" class="profile-pic">
                <div class="status-badge">BUSY</div>
            </div>
            <h1 class="user-name">biskuit :3</h1>
            <div class="user-greeting-chip">Haii~ :3</div>
        </section>

        <section class="expressive-card">
            <h2 class="card-label-header">Info</h2>
            <div class="info-stack">
                <div class="info-pill-row">
                    <span class="info-key">Favorite Identity</span>
                    <span class="info-val">Sylveon</span>
                </div>
                <div class="info-pill-row">
                    <span class="info-key">Fandom</span>
                    <span class="info-val">Cat / Kitty</span>
                </div>
                <div class="info-pill-row">
                    <span class="info-key">Passions</span>
                    <span class="info-val">Love Tech stuff</span>
                </div>
                <div class="info-pill-row">
                    <span class="info-key">OS Core Statement</span>
                    <span class="info-val">I use Arch btw :3</span>
                </div>
                <div class="info-pill-row">
                    <span class="info-key">Origin Node</span>
                    <span class="info-val">Indonesian</span>
                </div>
            </div>
        </section>

        <main class="expressive-card">
            <h2 class="card-label-header">Expressive Player</h2>

            <audio id="audio1" src="clouds.mp3" preload="none"></audio>
            <audio id="audio2" src="dismiss.mp3" preload="none"></audio>

            <div id="row1" class="track-strip" onclick="togglePlay('audio1','row1')">
                <div class="track-core">
                    <button class="action-toggle-trigger" id="btn-audio1">Play</button>
                    <div class="track-meta-data">
                        <span class="track-title-node">Clouds. F 172bpm 450hz</span>
                        <span class="track-author-node">0vvv0</span>
                    </div>
                </div>
                <!-- Progress bar sits inside the strip, grows along the bottom -->
                <div class="track-progress-bar" id="prog-audio1"></div>
            </div>

            <div id="row2" class="track-strip" onclick="togglePlay('audio2','row2')">
                <div class="track-core">
                    <button class="action-toggle-trigger" id="btn-audio2">Play</button>
                    <div class="track-meta-data">
                        <span class="track-title-node">Dismiss. Fm 153bpm 430hz</span>
                        <span class="track-author-node">0vvv0</span>
                    </div>
                </div>
                <div class="track-progress-bar" id="prog-audio2"></div>
            </div>
        </main>

        <footer class="certified-footer">
            Linux DistroHopper Certified
        </footer>

    </div>

    <script>
        // Track the rAF/interval handles for progress updates
        var progressIntervals = {};

        /**
         * Resets a track row back to its idle state.
         * Called when: user pauses, another track plays, or audio ends.
         */
        function resetTrack(audioId, rowId) {
            var row  = document.getElementById(rowId);
            var btn  = document.getElementById('btn-' + audioId);
            var prog = document.getElementById('prog-' + audioId);

            row.classList.remove('active-playing-strip');
            btn.textContent = 'Play';

            if (prog) prog.style.width = '0%';

            // Clear the progress interval
            if (progressIntervals[audioId]) {
                clearInterval(progressIntervals[audioId]);
