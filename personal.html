<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekogram Profile - biskuit :3</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #17212b; /* Exact Nekogram dark mode workspace background, owo */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar Component matching app layout */
        .app-bar {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 14px 16px;
            background: #17212b;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-arrow {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .app-bar-title {
            font-size: 1.25rem;
            font-weight: 500;
        }

        /* Profile Block Header Container */
        .profile-section {
            background: #17212b;
            padding: 10px 16px 20px 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 4px solid #0e1621; /* Separation bar channel, nyaa~! */
        }

        .profile-pic {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .presence-status {
            font-size: 0.85rem;
            color: #5288c1; /* App-accurate blue status text, uwu */
        }

        .user-id-badge {
            font-size: 0.8rem;
            color: #7f8c9a;
            margin-top: 2px;
        }

        /* Full Custom Account Info Details Section */
        .info-section {
            background: #17212b;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-bottom: 4px solid #0e1621;
        }

        .info-section-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: #5288c1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .info-label {
            font-size: 0.9rem;
            color: #7f8c9a;
            font-weight: 500;
        }

        .info-value {
            font-size: 0.95rem;
            color: #f5f5f5;
            text-align: right;
            max-width: 65%;
            font-family: monospace;
        }

        /* Playlist Interface Component */
        .playlist-section {
            background: #17212b;
            padding: 16px;
            flex-grow: 1;
        }

        .playlist-header {
            font-size: 0.95rem;
            font-weight: bold;
            color: #5288c1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        /* Audio Track Strip Row Components */
        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 8px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s ease;
            margin-bottom: 6px;
        }

        .track-item:hover {
            background: #202b36;
        }

        .track-left {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 85%;
        }

        /* Clean app styled rectangular action button node */
        .play-action-btn {
            background: #2b394a;
            color: #5288c1;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            min-width: 70px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .track-details {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            white-space: nowrap;
        }

        .track-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #ffffff;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .track-artist {
            font-size: 0.8rem;
            color: #7f8c9a;
            margin-top: 2px;
        }

        .track-right-drag {
            font-size: 1.2rem;
            color: #2b394a;
        }

        /* Interactive Active Audio Row Glow Tints */
        .playing-row {
            background: rgba(82, 136, 193, 0.08) !important;
        }
        
        .playing-row .play-action-btn {
            background: #5288c1 !important;
            color: #ffffff !important;
        }
    </style>
</head>
