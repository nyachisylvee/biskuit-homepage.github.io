<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>biskuit hub - index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght,GRAD@8..144,25..151,100..1000,-200..150&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --md-bg: #0c0f14; --md-surface: #161920; --md-surface-variant: #1e232d;
            --md-primary: #adc6ff; --md-on-surface: #e3e2e6; --md-variant: #c4c6d0;
            --md-ease-expressive: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        body { font-family: 'Roboto Flex', sans-serif; background-color: var(--md-bg); color: var(--md-on-surface); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .hub-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 24px; }
        
        .brand-hero { background: rgba(22, 25, 32, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 36px 12px 36px 36px; padding: 24px; display: flex; align-items: center; gap: 20px; }
        .avatar-node { width: 76px; height: 76px; border-radius: 28px 12px 28px 28px; object-fit: cover; border: 2px solid var(--md-primary); }
        .hub-main-title { font-size: 1.8rem; font-weight: 900; color: #ffffff; }
        
        .section-box { background: rgba(22, 25, 32, 0.75); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 28px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .category-header { font-size: 0.85rem; font-weight: 900; color: var(--md-primary); text-transform: uppercase; letter-spacing: 2px; }
        
        .reveal-glow-btn { position: relative; background: var(--md-surface); border: 2px solid transparent; border-radius: 18px 6px 18px 18px; padding: 16px 24px; text-decoration: none; color: #ffffff; cursor: pointer; overflow: hidden; transition: 0.3s; }
        .reveal-glow-btn::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: inherit; padding: 2px; background: radial-gradient(circle 130px at var(--mouse-x, 0) var(--mouse-y, 0), rgba(173, 198, 255, 0.35), transparent 80%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; pointer-events: none; opacity: 0; transition: opacity 0.4s ease; }
        .reveal-glow-btn:hover::before { opacity: 1; }
        .reveal-glow-btn:hover { background: var(--md-surface-variant); transform: scale(1.02); }
        
        /* New Extra Styles, nyaa~! */
        .legacy-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 18px; padding: 16px 24px; text-decoration: none; color: var(--md-variant); text-align: center; font-weight: 600; transition: 0.3s; }
        .legacy-btn:hover { background: rgba(255, 255, 255, 0.06); color: var(--md-primary); }
    </style>
</head>
<body>
    <div class="hub-container">
        <header class="brand-hero">
            <img src="avatar.png" alt="Cookie" class="avatar-node">
            <div class="title-meta">
                <h1 class="hub-main-title">Cookie :3</h1>
                <span class="hub-subtitle" style="color:var(--md-primary)">Website Hub</span>
            </div>
        </header>

        <section class="section-box">
            <h2 class="category-header">Main Section</h2>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <a href="https://linktr.ee/Smg5official55" target="_blank" class="reveal-glow-btn">Linktree ↗</a>
                <a href="./personal.html" class="reveal-glow-btn">Personal →</a>
            </div>
        </section>

        <section class="section-box">
            <h2 class="category-header">Extra</h2>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <a href="./index-fallback.html" class="reveal-glow-btn">Fallback</a>
                <a href="https://nyawh.my.canva.site/cookie-mainweb" target="_blank" class="legacy-btn">Legacy Version</a>
            </div>
        </section>
    </div>

    <script>
        document.querySelectorAll('.reveal-glow-btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                btn.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                btn.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            });
        });
    </script>
</body>
